<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ngày & Giờ — Âm Lịch & Dương Lịch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕐</text></svg>">
  <meta property="og:title" content="Ngày & Giờ — Âm Lịch & Dương Lịch">
  <meta property="og:description" content="Xem ngày âm lịch, dương lịch và giờ hiện tại theo múi giờ Việt Nam">
  <meta name="theme-color" content="#0d0d1a">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d1a;
      --bg2:     #1a1a2e;
      --card:    #1e1e34;
      --border:  #2a2a4a;
      --accent:  #7c6ff7;
      --accent2: #a78bfa;
      --gold:    #fbbf24;
      --gold2:   #fde68a;
      --pink:    #f9a8d4;
      --sky:     #60a5fa;
      --mint:    #6ee7b7;
      --white:   #e8e8f0;
      --gray:    rgba(255,255,255,0.45);
      --glow:    rgba(124,111,247,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 20%, #1a1a2e 0%, #0d0d1a 50%, #060610 100%);
      color: var(--white);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── LOADING ─────────────────────────────────────────── */
    .loading-screen {
      position: fixed; inset: 0; z-index: 99999;
      background: radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #0d0d1a 60%, #060610 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .loading-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .loading-icon { font-size: 3.5rem; animation: loadPulse 1.2s ease-in-out infinite; }
    @keyframes loadPulse {
      0%,100% { transform: scale(1); opacity: 0.7; }
      50%     { transform: scale(1.2); opacity: 1; }
    }
    .loading-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; color: var(--accent2); letter-spacing: 1px;
    }
    .loading-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 100px; overflow: hidden; }
    .loading-bar-fill {
      height: 100%; width: 0%; border-radius: 100px;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      animation: loadFill 1.5s ease forwards;
    }
    @keyframes loadFill { 0% { width: 0%; } 60% { width: 75%; } 100% { width: 100%; } }

    /* ── HEADER ──────────────────────────────────────────── */
    .page-header {
      text-align: center;
      padding: 60px 20px 20px;
    }
    .page-header .eyebrow {
      font-family: 'Dancing Script', cursive;
      font-size: 1.4rem; color: var(--accent2);
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent2), var(--gold2), var(--accent2));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 4s ease infinite;
    }
    @keyframes gradShift {
      0%,100% { background-position: 0% 50%; }
      50%     { background-position: 100% 50%; }
    }
    .page-header .sub {
      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--gray);
    }

    /* ── MAIN CONTAINER ──────────────────────────────────── */
    .container {
      width: 100%;
      max-width: 800px;
      padding: 0 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── CLOCK SECTION ───────────────────────────────────── */
    .clock-section {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, rgba(124,111,247,0.08), rgba(251,191,36,0.05));
      border: 1px solid var(--border);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }
    .clock-section::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, var(--glow) 0%, transparent 60%);
      animation: clockGlow 6s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes clockGlow {
      0%,100% { opacity: 0.3; transform: scale(1); }
      50%     { opacity: 0.6; transform: scale(1.1); }
    }

    .clock-time {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--white), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
    }
    .clock-seconds {
      font-size: 0.45em;
      vertical-align: super;
      color: var(--gold);
      -webkit-text-fill-color: var(--gold);
    }
    .clock-date {
      margin-top: 8px;
      font-size: 1rem;
      color: var(--gray);
      position: relative;
      z-index: 1;
    }
    .clock-timezone {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--accent2);
      position: relative;
      z-index: 1;
    }

    /* ── DATE CARDS ───────────────────────────────────────── */
    .date-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .date-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .date-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .date-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 18px 18px 0 0;
    }
    .date-card.solar::after {
      background: linear-gradient(90deg, var(--sky), var(--mint));
    }
    .date-card.lunar::after {
      background: linear-gradient(90deg, var(--gold), var(--pink));
    }

    .date-card .card-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .date-card .card-label {
      font-family: 'Dancing Script', cursive;
      font-size: 1.2rem;
      color: var(--gray);
      margin-bottom: 16px;
    }
    .date-card .card-day {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
    }
    .date-card.solar .card-day {
      color: var(--sky);
    }
    .date-card.lunar .card-day {
      color: var(--gold);
    }
    .date-card .card-month-year {
      font-size: 1.05rem;
      color: var(--white);
      margin-bottom: 6px;
    }
    .date-card .card-weekday {
      font-size: 0.9rem;
      color: var(--gray);
    }
    .date-card .card-extra {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--accent2);
      line-height: 1.6;
    }

    /* ── INFO SECTION ─────────────────────────────────────── */
    .info-section {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }
    .info-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      transition: transform 0.3s ease;
    }
    .info-box:hover {
      transform: translateY(-3px);
    }
    .info-box .info-icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .info-box .info-label {
      font-size: 0.75rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .info-box .info-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--white);
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 30px 20px;
      font-size: 0.8rem;
      color: var(--gray);
    }

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media (max-width: 600px) {
      .page-header { padding: 40px 16px 16px; }
      .page-header .eyebrow { font-size: 1.2rem; }
      .container { padding: 0 16px 40px; gap: 20px; }

      .clock-section { padding: 30px 16px; border-radius: 16px; }
      .clock-time { letter-spacing: 2px; }

      .date-cards {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .date-card { padding: 24px 20px; border-radius: 16px; }

      .info-section {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .info-box { padding: 16px 14px; border-radius: 12px; }
    }

    /* ── ANIMATION ────────────────────────────────────────── */
    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-icon">🕐</div>
    <div class="loading-text">Đang tải...</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <!-- HEADER -->
  <div class="page-header">
    <div class="eyebrow">Thời gian hiện tại</div>
    <h1>Ngày & Giờ Việt Nam</h1>
    <div class="sub">Âm lịch & Dương lịch — Múi giờ Hồ Chí Minh (UTC+7)</div>
  </div>

  <!-- MAIN -->
  <div class="container">

    <!-- CLOCK -->
    <div class="clock-section fade-up">
      <div class="clock-time" id="clockTime">--:--<span class="clock-seconds">00</span></div>
      <div class="clock-date" id="clockDate">---</div>
      <div class="clock-timezone">Asia/Ho_Chi_Minh (GMT+7)</div>
    </div>

    <!-- DATE CARDS -->
    <div class="date-cards">
      <div class="date-card solar fade-up">
        <div class="card-icon">☀️</div>
        <div class="card-label">Dương Lịch</div>
        <div class="card-day" id="solarDay">--</div>
        <div class="card-month-year" id="solarMonthYear">---</div>
        <div class="card-weekday" id="solarWeekday">---</div>
        <div class="card-extra" id="solarExtra"></div>
      </div>
      <div class="date-card lunar fade-up">
        <div class="card-icon">🌙</div>
        <div class="card-label">Âm Lịch</div>
        <div class="card-day" id="lunarDay">--</div>
        <div class="card-month-year" id="lunarMonthYear">---</div>
        <div class="card-weekday" id="lunarWeekday">---</div>
        <div class="card-extra" id="lunarExtra"></div>
      </div>
    </div>

    <!-- INFO BOXES -->
    <div class="info-section">
      <div class="info-box fade-up">
        <div class="info-icon">📅</div>
        <div class="info-label">Ngày trong năm</div>
        <div class="info-value" id="dayOfYear">---</div>
      </div>
      <div class="info-box fade-up">
        <div class="info-icon">📆</div>
        <div class="info-label">Tuần thứ</div>
        <div class="info-value" id="weekOfYear">---</div>
      </div>
      <div class="info-box fade-up">
        <div class="info-icon">🐾</div>
        <div class="info-label">Năm con giáp</div>
        <div class="info-value" id="zodiacYear">---</div>
      </div>
    </div>

  </div>

  <div class="footer">Múi giờ: Asia/Ho_Chi_Minh (UTC+7)</div>

<script>
// ══════════════════════════════════════════════════════════
// LUNAR CALENDAR CONVERSION (Vietnamese Lunar Calendar)
// Based on Ho Ngoc Duc's algorithm
// ══════════════════════════════════════════════════════════

const PI = Math.PI;

function jdFromDate(dd, mm, yy) {
  var a = Math.floor((14 - mm) / 12);
  var y = yy + 4800 - a;
  var m = mm + 12 * a - 3;
  var jd = dd + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
  if (jd < 2299161) {
    jd = dd + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - 32083;
  }
  return jd;
}

function jdToDate(jd) {
  var a, b, c, d, e, m, day, month, year;
  if (jd > 2299160) {
    a = jd + 32044;
    b = Math.floor((4 * a + 3) / 146097);
    c = a - Math.floor((b * 146097) / 4);
  } else {
    b = 0;
    c = jd + 32082;
  }
  d = Math.floor((4 * c + 3) / 1461);
  e = c - Math.floor((1461 * d) / 4);
  m = Math.floor((5 * e + 2) / 153);
  day = e - Math.floor((153 * m + 2) / 5) + 1;
  month = m + 3 - 12 * Math.floor(m / 10);
  year = b * 100 + d - 4800 + Math.floor(m / 10);
  return [day, month, year];
}

function NewMoon(k) {
  var T = k / 1236.85;
  var T2 = T * T;
  var T3 = T2 * T;
  var dr = PI / 180;
  var Jd1 = 2415020.75933 + 29.53058868 * k + 0.0001178 * T2 - 0.000000155 * T3;
  Jd1 = Jd1 + 0.00033 * Math.sin((166.56 + 132.87 * T - 0.009173 * T2) * dr);
  var M = 359.2242 + 29.10535608 * k - 0.0000333 * T2 - 0.00000347 * T3;
  var Mpr = 306.0253 + 385.81691806 * k + 0.0107306 * T2 + 0.00001236 * T3;
  var F = 21.2964 + 390.67050646 * k - 0.0016528 * T2 - 0.00000239 * T3;
  var C1 = (0.1734 - 0.000393 * T) * Math.sin(M * dr) + 0.0021 * Math.sin(2 * dr * M);
  C1 = C1 - 0.4068 * Math.sin(Mpr * dr) + 0.0161 * Math.sin(dr * 2 * Mpr);
  C1 = C1 - 0.0004 * Math.sin(dr * 3 * Mpr);
  C1 = C1 + 0.0104 * Math.sin(dr * 2 * F) - 0.0051 * Math.sin(dr * (M + Mpr));
  C1 = C1 - 0.0074 * Math.sin(dr * (M - Mpr)) + 0.0004 * Math.sin(dr * (2 * F + M));
  C1 = C1 - 0.0004 * Math.sin(dr * (2 * F - M)) - 0.0006 * Math.sin(dr * (2 * F + Mpr));
  C1 = C1 + 0.001 * Math.sin(dr * (2 * F - Mpr)) + 0.0005 * Math.sin(dr * (2 * Mpr + M));
  var deltat;
  if (T < -11) {
    deltat = 0.001 + 0.000839 * T + 0.0002261 * T2 - 0.00000845 * T3 - 0.000000081 * T * T3;
  } else {
    deltat = -0.000278 + 0.000265 * T + 0.000262 * T2;
  }
  return Jd1 + C1 - deltat;
}

function SunLongitude(jdn) {
  var T = (jdn - 2451545.0) / 36525;
  var T2 = T * T;
  var dr = PI / 180;
  var M = 357.5291 + 35999.0503 * T - 0.0001559 * T2 - 0.00000048 * T * T2;
  var L0 = 280.46645 + 36000.76983 * T + 0.0003032 * T2;
  var DL = (1.9146 - 0.004817 * T - 0.000014 * T2) * Math.sin(dr * M);
  DL = DL + (0.019993 - 0.000101 * T) * Math.sin(dr * 2 * M) + 0.00029 * Math.sin(dr * 3 * M);
  var L = L0 + DL;
  L = L * dr;
  L = L - PI * 2 * (Math.floor(L / (PI * 2)));
  return L;
}

function getSunLongitude(dayNumber, timeZone) {
  return Math.floor(SunLongitude(dayNumber - 0.5 - timeZone / 24) / PI * 6);
}

function getNewMoonDay(k, timeZone) {
  return Math.floor(NewMoon(k) + 0.5 + timeZone / 24);
}

function getLunarMonth11(yy, timeZone) {
  var off = jdFromDate(31, 12, yy) - 2415021;
  var k = Math.floor(off / 29.530588853);
  var nm = getNewMoonDay(k, timeZone);
  var sunLong = getSunLongitude(nm, timeZone);
  if (sunLong >= 9) {
    nm = getNewMoonDay(k - 1, timeZone);
  }
  return nm;
}

function getLeapMonthOffset(a11, timeZone) {
  var k = Math.floor((a11 - 2415021.076998695) / 29.530588853 + 0.5);
  var last = 0;
  var i = 1;
  var arc = getSunLongitude(getNewMoonDay(k + i, timeZone), timeZone);
  do {
    last = arc;
    i++;
    arc = getSunLongitude(getNewMoonDay(k + i, timeZone), timeZone);
  } while (arc != last && i < 14);
  return i - 1;
}

function convertSolar2Lunar(dd, mm, yy, timeZone) {
  var k, dayNumber, monthStart, a11, b11, lunarDay, lunarMonth, lunarYear, lunarLeap;
  dayNumber = jdFromDate(dd, mm, yy);
  k = Math.floor((dayNumber - 2415021.076998695) / 29.530588853);
  monthStart = getNewMoonDay(k + 1, timeZone);
  if (monthStart > dayNumber) {
    monthStart = getNewMoonDay(k, timeZone);
  }
  a11 = getLunarMonth11(yy, timeZone);
  b11 = a11;
  if (a11 >= monthStart) {
    lunarYear = yy;
    a11 = getLunarMonth11(yy - 1, timeZone);
  } else {
    lunarYear = yy + 1;
    b11 = getLunarMonth11(yy + 1, timeZone);
  }
  lunarDay = dayNumber - monthStart + 1;
  var diff = Math.floor((monthStart - a11) / 29);
  lunarLeap = 0;
  lunarMonth = diff + 11;
  if (b11 - a11 > 365) {
    var leapMonthDiff = getLeapMonthOffset(a11, timeZone);
    if (diff >= leapMonthDiff) {
      lunarMonth = diff + 10;
      if (diff == leapMonthDiff) {
        lunarLeap = 1;
      }
    }
  }
  if (lunarMonth > 12) {
    lunarMonth = lunarMonth - 12;
  }
  if (lunarMonth >= 11 && diff < 4) {
    lunarYear -= 1;
  }
  return [lunarDay, lunarMonth, lunarYear, lunarLeap];
}

// ══════════════════════════════════════════════════════════
// CAN CHI (Heavenly Stems & Earthly Branches)
// ══════════════════════════════════════════════════════════

const CAN = ['Canh', 'Tân', 'Nhâm', 'Quý', 'Giáp', 'Ất', 'Bính', 'Đinh', 'Mậu', 'Kỷ'];
const CHI = ['Thân', 'Dậu', 'Tuất', 'Hợi', 'Tý', 'Sửu', 'Dần', 'Mão', 'Thìn', 'Tỵ', 'Ngọ', 'Mùi'];
const ZODIAC_EMOJI = ['🐵', '🐔', '🐶', '🐷', '🐀', '🐂', '🐅', '🐇', '🐉', '🐍', '🐴', '🐐'];

function getCanChi(year) {
  return CAN[year % 10] + ' ' + CHI[year % 12];
}

function getZodiacEmoji(year) {
  return ZODIAC_EMOJI[year % 12];
}

// ══════════════════════════════════════════════════════════
// VIETNAMESE MONTH NAMES
// ══════════════════════════════════════════════════════════

const MONTHS_VI = [
  'Tháng Một', 'Tháng Hai', 'Tháng Ba', 'Tháng Tư',
  'Tháng Năm', 'Tháng Sáu', 'Tháng Bảy', 'Tháng Tám',
  'Tháng Chín', 'Tháng Mười', 'Tháng Mười Một', 'Tháng Mười Hai'
];

const WEEKDAYS_VI = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];

// ══════════════════════════════════════════════════════════
// CLOCK & DATE UPDATE
// ══════════════════════════════════════════════════════════

function updateClock() {
  const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Ho_Chi_Minh' }));
  const nowReal = new Date();
  // Use Intl for accurate HCM time
  const formatter = new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Asia/Ho_Chi_Minh',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
  const dateFmt = new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Asia/Ho_Chi_Minh',
    year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'long'
  });
  const parts = formatter.formatToParts(nowReal);
  const h = parts.find(p => p.type === 'hour').value;
  const m = parts.find(p => p.type === 'minute').value;
  const s = parts.find(p => p.type === 'second').value;

  const dateParts = dateFmt.formatToParts(nowReal);
  const day = parseInt(dateParts.find(p => p.type === 'day').value);
  const month = parseInt(dateParts.find(p => p.type === 'month').value);
  const year = parseInt(dateParts.find(p => p.type === 'year').value);
  const weekday = now.getDay();

  // Clock display
  document.getElementById('clockTime').innerHTML =
    `${h}:${m}<span class="clock-seconds">${s}</span>`;
  document.getElementById('clockDate').textContent =
    `${WEEKDAYS_VI[weekday]}, ${String(day).padStart(2,'0')}/${String(month).padStart(2,'0')}/${year}`;

  // Solar card
  document.getElementById('solarDay').textContent = String(day).padStart(2, '0');
  document.getElementById('solarMonthYear').textContent = `${MONTHS_VI[month - 1]} ${year}`;
  document.getElementById('solarWeekday').textContent = WEEKDAYS_VI[weekday];

  const startOfYear = new Date(year, 0, 1);
  const nowDate = new Date(year, month - 1, day);
  const dayOfYear = Math.floor((nowDate - startOfYear) / 86400000) + 1;
  const isLeap = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
  const totalDays = isLeap ? 366 : 365;

  document.getElementById('solarExtra').innerHTML =
    `Ngày ${dayOfYear}/${totalDays} trong năm<br>${isLeap ? 'Năm nhuận' : 'Năm thường'}`;

  // Lunar card
  const lunar = convertSolar2Lunar(day, month, year, 7);
  const lDay = lunar[0], lMonth = lunar[1], lYear = lunar[2], lLeap = lunar[3];

  document.getElementById('lunarDay').textContent = String(lDay).padStart(2, '0');
  const leapStr = lLeap ? ' (Nhuận)' : '';
  document.getElementById('lunarMonthYear').textContent =
    `Tháng ${lMonth}${leapStr} năm ${getCanChi(lYear)}`;
  document.getElementById('lunarWeekday').textContent =
    `${getZodiacEmoji(lYear)} Năm ${getCanChi(lYear)}`;
  document.getElementById('lunarExtra').innerHTML =
    `Ngày ${lDay} tháng ${lMonth}${leapStr}<br>Năm ${getCanChi(lYear)} (${lYear})`;

  // Info boxes
  document.getElementById('dayOfYear').textContent = `${dayOfYear} / ${totalDays}`;

  const oneJan = new Date(year, 0, 1);
  const weekNum = Math.ceil(((nowDate - oneJan) / 86400000 + oneJan.getDay() + 1) / 7);
  document.getElementById('weekOfYear').textContent = `${weekNum} / 52`;

  document.getElementById('zodiacYear').textContent =
    `${getZodiacEmoji(lYear)} ${getCanChi(lYear)}`;
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', () => {
  // Loading screen
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('hide');
  }, 1800);

  // Start clock
  updateClock();
  setInterval(updateClock, 1000);

  // Fade-in animations
  setTimeout(() => {
    const els = document.querySelectorAll('.fade-up');
    els.forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 150);
    });
  }, 2000);
});
</script>
