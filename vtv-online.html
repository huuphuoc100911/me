<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VTV Online — Local viewer</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg-card: #1a1a1a;
    --bg-card-2: #222;
    --text: #f0f0f0;
    --text-dim: #999;
    --accent: #e60012;
    --border: #2a2a2a;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
                 Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--text-dim);
    margin-top: 6px;
    font-size: 14px;
  }

  /* ===== HOME — grid kênh ===== */
  .channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }

  .channel-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-2) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
  }
  .channel-card:hover {
    transform: scale(1.03);
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(230, 0, 18, 0.15);
  }
  .channel-card .name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .channel-card .desc {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ===== PLAYER ===== */
  .player-view { display: none; }
  .player-view.active { display: block; }
  .home-view.hidden { display: none; }

  .player-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .player-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .back-btn {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s, border-color 0.2s;
  }
  .back-btn:hover {
    background: var(--bg-card-2);
    border-color: var(--accent);
  }
  .now-playing {
    font-size: 16px;
    font-weight: 600;
  }
  .now-playing .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-left: 8px;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .player-shell {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .player-shell iframe,
  .player-shell video {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .player-loading,
  .player-error {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background: rgba(0, 0, 0, 0.85);
  }
  .player-loading .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .player-loading p { color: var(--text-dim); font-size: 14px; }

  .player-error h3 { font-size: 18px; margin-bottom: 8px; }
  .player-error p {
    color: var(--text-dim);
    font-size: 14px;
    max-width: 480px;
    margin-bottom: 16px;
  }
  .player-error a {
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: opacity 0.2s;
  }
  .player-error a:hover { opacity: 0.85; }

  footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    .container { padding: 20px 14px; }
    header h1 { font-size: 24px; }
    .channel-card { padding: 16px; }
    .channel-card .name { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1><span>VTV</span> Online</h1>
    <p>Xem trực tuyến — Local viewer</p>
  </header>

  <!-- ===== HOME VIEW ===== -->
  <main id="homeView" class="home-view">
    <div id="channelGrid" class="channel-grid"></div>
  </main>

  <!-- ===== PLAYER VIEW ===== -->
  <main id="playerView" class="player-view">
    <div class="player-bar">
      <button id="backBtn" class="back-btn">← Quay lại danh sách</button>
      <div class="player-actions">
        <button id="forceHlsBtn" class="back-btn" title="Bỏ qua iframe, dùng HLS ngay">Dùng HLS</button>
        <a id="openVtvgoBtn" class="back-btn" target="_blank" rel="noopener noreferrer" title="Mở vtvgo.vn ở tab mới">Mở vtvgo.vn ↗</a>
      </div>
      <div class="now-playing">
        <span id="nowPlayingName">—</span>
        <span id="modeBadge" class="badge">iframe</span>
      </div>
    </div>
    <div id="playerShell" class="player-shell"></div>
  </main>

  <footer>
    Nội dung thuộc bản quyền Đài Truyền Hình Việt Nam (VTV).<br />
    Tool này chỉ để xem cá nhân.
  </footer>

</div>

let currentHls = null;       // hls.js instance hiện tại (để destroy khi đổi kênh)
let iframeTimer = null;      // timer kiểm tra iframe load
let stallWatchdog = null;    // interval kiểm tra video có thật sự kẹt không

// ===== Render grid kênh =====
function renderHome() {
  channelGrid.innerHTML = "";
  CHANNELS.forEach((ch, idx) => {
    const card = document.createElement("div");
    card.className = "channel-card";
    card.tabIndex = 0;
    card.setAttribute("role", "button");
    card.setAttribute("aria-label", `Xem ${ch.name}`);

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = ch.name;

    const desc = document.createElement("div");
    desc.className = "desc";
    desc.textContent = ch.desc;

    card.appendChild(name);
    card.appendChild(desc);
    card.addEventListener("click", () => playChannel(idx));
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        playChannel(idx);
      }
    });

    channelGrid.appendChild(card);
  });
}

// ===== Chuyển sang view player =====
function showPlayer(channel) {
  homeView.classList.add("hidden");
  playerView.classList.add("active");
  nowPlayingName.textContent = channel.name;
  openVtvgoBtn.href = channel.vtvgoUrl;
}

// ===== Quay về home — dọn iframe + hls =====
function showHome() {
  cleanupPlayer();
  playerView.classList.remove("active");
  homeView.classList.remove("hidden");
  localStorage.removeItem(LS_KEY);
}

function cleanupPlayer() {
  if (iframeTimer)   { clearTimeout(iframeTimer); iframeTimer = null; }
  if (stallWatchdog) { clearInterval(stallWatchdog); stallWatchdog = null; }
  if (currentHls)    { currentHls.destroy(); currentHls = null; }
  playerShell.innerHTML = "";
}

// ===== UI helpers =====
function showLoading(msg) {
  const el = document.createElement("div");
  el.className = "player-loading";
  el.id = "playerLoading";
  el.innerHTML = `<div class="spinner"></div><p>${msg}</p>`;
  playerShell.appendChild(el);
}
function removeLoading() {
  const el = document.getElementById("playerLoading");
  if (el) el.remove();
}
function showError(channel, message) {
  removeLoading();
  removeError();
  const el = document.createElement("div");
  el.className = "player-error";
  el.id = "playerError";
  el.innerHTML = `
    <h3>Không thể phát kênh</h3>
    <p>${message}</p>
    <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center;">
      <button id="retryBtn" class="back-btn">Thử lại</button>
      <a href="${channel.vtvgoUrl}" target="_blank" rel="noopener noreferrer">
        Mở trên VTVgo
      </a>
    </div>
  `;
  playerShell.appendChild(el);
  document.getElementById("retryBtn").addEventListener("click", () => {
    tryHls(channel);
  });
}
function removeError() {
  const el = document.getElementById("playerError");
  if (el) el.remove();
}

/* Thử play CÓ tiếng trước. Nếu browser từ chối (autoplay policy chặn
   khi không có user-activation, vd reload page) → fallback mute để
   ít nhất video chạy được, kèm overlay nhắc bấm "Bật tiếng". */
function tryPlayWithSound(video) {
  video.muted = false;
  const p = video.play();
  if (!p || typeof p.then !== "function") return;
  p.catch((err) => {
    console.warn("[VTV] autoplay với tiếng bị chặn:", err.name, "→ fallback mute");
    video.muted = true;
    video.play().catch(() => {});
    showUnmuteHint(video);
  });
}

/* Hiện overlay "🔊 Bật tiếng" — bấm sẽ unmute (click = user-activation). */
function showUnmuteHint(video) {
  removeUnmuteHint();
  const btn = document.createElement("button");
  btn.id = "unmuteHint";
  btn.type = "button";
  btn.textContent = "🔊 Bật tiếng";
  Object.assign(btn.style, {
    position: "absolute",
    top: "12px",
    left: "50%",
    transform: "translateX(-50%)",
    background: "var(--accent)",
    color: "#fff",
    border: "0",
    padding: "10px 18px",
    borderRadius: "999px",
    fontSize: "14px",
    fontWeight: "600",
    cursor: "pointer",
    zIndex: "10",
    boxShadow: "0 4px 14px rgba(0,0,0,0.5)"
  });
  btn.addEventListener("click", () => {
    video.muted = false;
    video.play().catch(() => {});
    removeUnmuteHint();
  });
  playerShell.appendChild(btn);

  // Tự ẩn nếu user thao tác trên video controls để unmute (vd bấm volume)
  video.addEventListener("volumechange", () => {
    if (!video.muted) removeUnmuteHint();
  }, { once: true });
}
function removeUnmuteHint() {
  const el = document.getElementById("unmuteHint");
  if (el) el.remove();
}

/* Stall watchdog — chỉ chạy sau khi MANIFEST_PARSED.
   Mỗi 2s kiểm tra video.currentTime có tiến không.
   Nếu video đang phải play (không pause, không ended, không bị user seek)
   mà currentTime đứng yên >12s → coi như stall thật → show error UI.
   Nếu video resume play sau khi đã show error → tự ẩn overlay error.   */
function startStallWatchdog(video, channel) {
  if (stallWatchdog) clearInterval(stallWatchdog);
  let lastTime = video.currentTime;
  let stalledFor = 0; // số giây đã đứng yên
  const CHECK_MS = 2000;
  const STALL_THRESHOLD_S = 12;

  stallWatchdog = setInterval(() => {
    if (!video.isConnected) { clearInterval(stallWatchdog); return; }

    const playing = !video.paused && !video.ended && video.readyState >= 2;
    const advanced = video.currentTime > lastTime + 0.05;

    if (playing && advanced) {
      // Video đang chạy bình thường — reset counter, ẩn error nếu có
      stalledFor = 0;
      removeError();
    } else if (playing && !advanced) {
      // Đáng lẽ phải play mà time không tiến → tích luỹ stall
      stalledFor += CHECK_MS / 1000;
      if (stalledFor >= STALL_THRESHOLD_S) {
        console.warn("[VTV] watchdog: video stalled", stalledFor, "s → show error");
        showError(channel, "Stream bị gián đoạn (video không tiến trong " + STALL_THRESHOLD_S + "s).");
        // Để hls tự retry tiếp; nếu nó recover, watchdog sẽ ẩn lỗi
        stalledFor = 0;
      }
    }
    // Nếu pause (user) → bỏ qua, không tính stall
    lastTime = video.currentTime;
  }, CHECK_MS);
}

/* ============================================================
   playChannel — logic chính
   ------------------------------------------------------------
   Cách A: thử iframe vtvgo.vn trước
     - Nếu iframe `load` event không fire trong 5s → coi như fail
     - (Lưu ý: với cross-origin block bằng X-Frame-Options, browser
       vẫn có thể fire `load` event trên page rỗng. Đây là giới hạn
       của iframe — không có cách 100% phát hiện block từ ngoài.)

   Cách B (fallback): nếu fail → thử m3u8Url qua hls.js
   Cách C (lỗi cuối): nếu m3u8Url trống → hiện UI lỗi + nút mở VTVgo
   ============================================================ */
function playChannel(idx) {
  const channel = CHANNELS[idx];
  if (!channel) return;

  currentChannel = channel;
  showPlayer(channel);
  cleanupPlayer();
  localStorage.setItem(LS_KEY, String(idx));

  // Có link m3u8 → HLS thẳng (mượt, không bị VTVgo chặn).
  // Không có → thử iframe vtvgo.vn (thường vẫn bị chặn bởi modal điều khoản).
  if (channel.m3u8Url && channel.m3u8Url.trim() !== "") {
    tryHls(channel);
  } else {
    tryIframe(channel);
  }
}

function tryIframe(channel) {
  modeBadge.textContent = "iframe";
  showLoading("Đang thử nhúng từ VTVgo…");

  const iframe = document.createElement("iframe");
  iframe.allow = "autoplay; fullscreen; picture-in-picture";
  iframe.allowFullscreen = true;
  iframe.referrerPolicy = "no-referrer";

  let loaded = false;
  iframe.addEventListener("load", () => {
    loaded = true;
    removeLoading();
    // Note: load event vẫn fire khi bị X-Frame-Options block.
    // Người dùng nhìn page trắng → tự bấm Quay lại để fallback.
  });

  // Sau 5s nếu load chưa fire → coi như fail, fallback qua HLS
  iframeTimer = setTimeout(() => {
    if (!loaded) {
      console.warn("[VTV] iframe load timeout → fallback m3u8");
      tryHls(channel);
    }
  }, IFRAME_TIMEOUT_MS);

  iframe.src = channel.vtvgoUrl;
  playerShell.appendChild(iframe);
}

function tryHls(channel) {
  cleanupPlayer();
  modeBadge.textContent = "hls";

  // Không có link m3u8 → bỏ qua sang lỗi cuối
  if (!channel.m3u8Url || channel.m3u8Url.trim() === "") {
    showError(
      channel,
      "Iframe bị block. Vui lòng thêm link m3u8 vào file HTML hoặc mở trên VTVgo."
    );
    return;
  }

  showLoading("Đang tải luồng HLS…");

  const video = document.createElement("video");
  video.controls = true;
  video.playsInline = true;
  // Mặc định KHÔNG mute. Khi user click card → có user-activation,
  // browser cho phép phát có tiếng. Khi restore từ localStorage (reload)
  // → play() sẽ reject vì autoplay policy → fallback mute + hint.
  video.muted = false;
  video.autoplay = true;
  playerShell.appendChild(video);

  // Safari có HLS native, các browser khác phải dùng hls.js
  if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = channel.m3u8Url;
    video.addEventListener("loadedmetadata", () => {
      removeLoading();
      tryPlayWithSound(video);
    });
    video.addEventListener("error", () => {
      showError(channel, "Không tải được luồng m3u8 (có thể link đã hết hạn).");
    });
    return;
  }

  if (window.Hls && Hls.isSupported()) {
    const hls = new Hls({
      // KHÔNG bật lowLatencyMode: stream FPT/vtvprime không phải LL-HLS,
      // bật vào sẽ gây stall trên kênh có discontinuity (vd VTV3).
      lowLatencyMode: false,
      enableWorker: true,
      backBufferLength: 30,

      // Stall recovery: tự "nudge" currentTime khi video kẹt
      nudgeOffset: 0.2,
      nudgeMaxRetry: 10,
      maxBufferHole: 1.0, // bỏ qua khoảng trống ≤1s do discontinuity

      // Retry khi mất network / segment lỗi tạm thời
      manifestLoadingMaxRetry: 6,
      manifestLoadingRetryDelay: 1000,
      levelLoadingMaxRetry: 6,
      levelLoadingRetryDelay: 1000,
      fragLoadingMaxRetry: 6,
      fragLoadingRetryDelay: 1000
    });
    currentHls = hls;
    hls.loadSource(channel.m3u8Url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      removeLoading();
      tryPlayWithSound(video);
      startStallWatchdog(video, channel);
    });

    // Khi error fire, KHÔNG hiện UI lỗi ngay — chỉ thử khôi phục im lặng.
    // Stall watchdog sẽ quyết định có hiện lỗi không (dựa vào currentTime
    // có còn tiến hay không). Lý do: 1 segment fail → fatal error firing,
    // nhưng video vẫn play từ buffer 30s — không nên show "lỗi" lúc đó.
    hls.on(Hls.Events.ERROR, (_evt, data) => {
      console.warn("[VTV] HLS error", data.type, data.details, "fatal=", data.fatal);
      if (!data.fatal) return;

      switch (data.type) {
        case Hls.ErrorTypes.NETWORK_ERROR:
          console.log("[VTV] network fatal → startLoad");
          try { hls.startLoad(); } catch(e) {}
          break;
        case Hls.ErrorTypes.MEDIA_ERROR:
          console.log("[VTV] media fatal → recoverMediaError");
          try { hls.recoverMediaError(); } catch(e) {}
          break;
        default:
          console.log("[VTV] other fatal:", data.details, "— để watchdog xử lý");
      }
    });
  } else {
    showError(channel, "Trình duyệt không hỗ trợ HLS.");
  }
}

// ===== Wire up =====
backBtn.addEventListener("click", showHome);
forceHlsBtn.addEventListener("click", () => {
  // Bỏ qua iframe (vd: VTVgo chặn modal điều khoản trong iframe do
  // third-party cookie partitioning) → ép sang HLS ngay
  if (currentChannel) tryHls(currentChannel);
});
window.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && playerView.classList.contains("active")) {
    showHome();
  }
});

renderHome();

// Khôi phục kênh đang xem khi reload (optional)
const lastIdx = localStorage.getItem(LS_KEY);
if (lastIdx !== null && CHANNELS[+lastIdx]) {
  playChannel(+lastIdx);
}
</script>
